services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: review_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/review_assistant
    depends_on:
      - postgres

volumes:
  postgres_data:
